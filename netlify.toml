[build]
  command = "npm run build"
  publish = "build/client"

# [functions]
#   directory = "build/server"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/react-router-server"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors https://*.myshopify.com https://admin.shopify.com https://partners.shopify.com; connect-src 'self' https://*.convex.cloud wss://*.convex.cloud https://cdn.shopify.com https://*.myshopify.com;"

