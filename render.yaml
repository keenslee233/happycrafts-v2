services:
  - type: web
    name: happycraftsv2-web
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: happycraftsv2-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        generateValue: false # Placeholder for manual input in Render UI
      - key: SHOPIFY_API_SECRET
        generateValue: false # Placeholder for manual input in Render UI
      - key: SHOPIFY_APP_URL
        generateValue: false # Placeholder for manual input in Render UI
      - key: NODE_ENV
        value: production

databases:
  - name: happycraftsv2-db
    databaseName: happycraftsv2_db
    user: happycraftsv2_user
    plan: free # Can be adjusted by user
